name: CI
on:
  push: { branches: [main] }
  pull_request:
jobs:
  test:
    # macos-15 to match release.yml: current xcodegen emits project format 77,
    # which macos-14's Xcode 15.4 cannot read.
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Swift tests (AgentKit + CLI)
        run: swift test
      - name: Build app
        run: |
          brew install xcodegen
          cd App && xcodegen
          xcodebuild -project AgentBar.xcodeproj -scheme AgentBar \
            -configuration Release build CODE_SIGNING_ALLOWED=NO
